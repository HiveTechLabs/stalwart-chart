apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "stalwart.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "stalwart.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  secretName: {{ include "stalwart.fullname" . }}-tls

  {{- if .Values.tls.commonName }}
  commonName: {{ .Values.tls.commonName }}
  {{- end }}

  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048

  dnsNames:
    {{ toYaml .Values.tls.dnsNames | nindent 4 }}

  issuerRef:
    name: {{ .Values.tls.issuerRef.name | quote }}
    kind: {{ .Values.tls.issuerRef.kind | quote }}
    group: {{ .Values.tls.issuerRef.group | quote }}
