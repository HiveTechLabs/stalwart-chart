apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "stalwart.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "stalwart.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.toml: |
    # AUTHENTICATION CONFIGURATION
    [authentication.fallback-admin]
    user = "%{env:STALWART_MAIL_ADMIN_USER}%"
    secret = "%{env:STALWART_MAIL_ADMIN_PASS}%"

    # SERVER CONFIGURATION
    [server]
    hostname = "{{ .Values.stalwart.defaultHostname }}"

    # TLS CERTIFICATE CONFIGURATION
    [certificate.default]
    cert = "%{file:/opt/stalwart/etc/private/tls.crt}%"
    private-key = "%{file:/opt/stalwart/etc/private/tls.key}%"

    {{- if .Values.stalwart.dkim.enabled }}
    # DKIM CONFIGURATION
    [auth.dkim]
    verify = {{ .Values.stalwart.dkim.verify | quote }}
    strict = {{ .Values.stalwart.dkim.strict }}
    sign = {{ .Values.stalwart.dkim.sign | toJson }}

    {{- range .Values.stalwart.dkim.signatures }}
    [signature.{{ .name | quote }}]
    private-key = "%{file:/etc/stalwart/dkim/{{ .privateKeyFile }}}%"
    domain = {{ .domain | quote }}
    selector = {{ .selector | quote }}
    headers = {{ .headers | toJson }}
    algorithm = {{ .algorithm | quote }}
    canonicalization = {{ .canonicalization | quote }}
    {{- if .expire }}
    expire = {{ .expire | quote }}
    {{- end }}
    set-body-length = {{ .setBodyLength }}
    report = {{ .report }}
    {{- end }}

    {{- end }}

    # PROTOCOL LISTENERS
    [server.listener.http]
    bind = "[::]:8080"
    protocol = "http"

    [server.listener.https]
    bind = "[::]:443"
    protocol = "http"
    tls.implicit = true

    [server.listener.imap]
    bind = "[::]:143"
    protocol = "imap"

    [server.listener.imaptls]
    bind = "[::]:993"
    protocol = "imap"
    tls.implicit = true

    [server.listener.pop3]
    bind = "[::]:110"
    protocol = "pop3"

    [server.listener.pop3s]
    bind = "[::]:995"
    protocol = "pop3"
    tls.implicit = true

    [server.listener.sieve]
    bind = "[::]:4190"
    protocol = "managesieve"

    [server.listener.smtp]
    bind = "[::]:25"
    protocol = "smtp"

    [server.listener.submission]
    bind = "[::]:587"
    protocol = "smtp"

    [server.listener.submissions]
    bind = "[::]:465"
    protocol = "smtp"
    tls.implicit = true

    # DIRECTORY CONFIGURATION
    [directory.internal]
    type = "internal"
    store = "postgresql"

    # STORAGE CONFIGURATION
    [storage]
    blob = "s3"
    data = "postgresql"
    directory = "internal"
    fts = "postgresql"
    lookup = "redis"

    # POSTGRESQL STORE
    [store."postgresql"]
    type = "postgresql"
    host = {{ .Values.postgresql.host | quote }}
    port = {{ .Values.postgresql.port }}
    database = {{ .Values.postgresql.database | quote }}
    user = "%{env:STALWART_POSTGRES_USERNAME}%"
    password = "%{env:STALWART_POSTGRES_PASSWORD}%"
    timeout = {{ .Values.postgresql.timeout | quote }}

    # VALKEY / REDIS LOOKUP STORE
    [store."redis"]
    type = "redis"
    redis-type = "single"
    urls = "{{- if .Values.valkey.tls }}rediss{{- else }}redis{{- end }}://{{- if .Values.valkey.usernameKey }}%{env:STALWART_VALKEY_USERNAME}%{{- end }}:%{env:STALWART_VALKEY_PASSWORD}%@{{ .Values.valkey.host }}:{{ .Values.valkey.port }}/{{ .Values.valkey.database }}{{- if and .Values.valkey.tls .Values.valkey.insecure }}#insecure{{- end }}"
    timeout = {{ .Values.valkey.timeout | quote }}

    # S3 BLOB STORE
    [store."s3"]
    type = "s3"
    bucket = "%{env:STALWART_S3_BUCKET}%"
    region = {{ .Values.s3.region | quote }}
    access-key = "%{env:STALWART_S3_ACCESS_KEY}%"
    secret-key = "%{env:STALWART_S3_SECRET_KEY}%"
    endpoint = "%{env:STALWART_S3_ENDPOINT}%"
    timeout = {{ .Values.s3.timeout | quote }}
    max-retries = {{ .Values.s3.maxRetries }}
    {{- if .Values.s3.keyPrefix }}
    key-prefix = {{ .Values.s3.keyPrefix | quote }}
    {{- end }}

    # METRICS CONFIGURATION
    {{- if .Values.stalwart.metrics.otel.enabled }}
    # OpenTelemetry metrics exporter
    [metrics.open-telemetry]
    transport = "{{ .Values.stalwart.metrics.otel.transport }}"
    endpoint = "{{ .Values.stalwart.metrics.otel.endpoint }}"
    interval = "{{ .Values.stalwart.metrics.otel.interval }}"
    {{- end }}

    # LOGGING CONFIGURATION
    # Console tracer - container logs (kubectl logs)
    {{- if .Values.stalwart.tracer.console.enabled }}
    [tracer.console]
    type = "console"
    level = "{{ .Values.stalwart.tracer.console.level }}"
    ansi = {{ .Values.stalwart.tracer.console.ansi }}
    enable = true
    {{- end }}

    # File tracer - optional for WebUI access
    {{- if .Values.stalwart.tracer.enabled }}
    [tracer.log]
    type = "log"
    path = "{{ .Values.stalwart.tracer.path }}"
    prefix = "{{ .Values.stalwart.tracer.prefix }}"
    rotate = "{{ .Values.stalwart.tracer.rotate }}"
    level = "{{ .Values.stalwart.tracer.level }}"
    ansi = {{ .Values.stalwart.tracer.ansi }}
    enable = true
    multiline = false
    buffered = true
    lossy = false
    {{- end }}

    # OpenTelemetry tracer for logs - sends logs to OTel Collector
    {{- if .Values.stalwart.tracer.otel.enableLogExporter }}
    [tracer.otel-logs]
    type = "open-telemetry"
    transport = "{{ .Values.stalwart.tracer.otel.transport }}"
    endpoint = "{{ .Values.stalwart.tracer.otel.logsEndpoint }}"
    level = "{{ .Values.stalwart.tracer.otel.level }}"
    enable = true
    enable.log-exporter = true
    enable.span-exporter = false
    {{- if .Values.stalwart.tracer.otel.throttle }}
    throttle = "{{ .Values.stalwart.tracer.otel.throttle }}"
    {{- end }}
    {{- end }}

    # OpenTelemetry tracer for traces - sends traces to OTel Collector
    {{- if .Values.stalwart.tracer.otel.enableSpanExporter }}
    [tracer.otel-traces]
    type = "open-telemetry"
    transport = "{{ .Values.stalwart.tracer.otel.transport }}"
    endpoint = "{{ .Values.stalwart.tracer.otel.tracesEndpoint }}"
    level = "{{ .Values.stalwart.tracer.otel.level }}"
    enable = true
    enable.log-exporter = false
    enable.span-exporter = true
    {{- if .Values.stalwart.tracer.otel.throttle }}
    throttle = "{{ .Values.stalwart.tracer.otel.throttle }}"
    {{- end }}
    {{- end }}
    {{- if .Values.clustering.enabled }}

    # CLUSTERING CONFIGURATION
    # Enables distributed coordination and high availability

    # NATS Coordination Backend
    # All cluster nodes communicate via NATS for state synchronization
    [store."nats"]
    type = "nats"
    address = {{ .Values.clustering.nats.addresses | toJson }}
    {{- if .Values.clustering.nats.authEnabled }}
    user = "%{env:NATS_USERNAME}%"
    password = "%{env:NATS_PASSWORD}%"
    {{- end }}
    no-echo = {{ .Values.clustering.nats.noEcho }}
    {{- if .Values.clustering.nats.tls.enabled }}
    tls.enable = true
    {{- else }}
    tls.enable = false
    {{- end }}
    timeout.connection = "{{ .Values.clustering.nats.timeouts.connection }}"
    timeout.request = "{{ .Values.clustering.nats.timeouts.request }}"
    ping-interval = "{{ .Values.clustering.nats.pingInterval }}"
    max-reconnects = {{ .Values.clustering.nats.maxReconnects }}
    capacity.client = {{ .Values.clustering.nats.capacity.client }}
    capacity.subscription = {{ .Values.clustering.nats.capacity.subscription }}
    capacity.read-buffer = {{ .Values.clustering.nats.capacity.readBuffer }}

    # Cluster Configuration
    # Node ID injected directly from pod-index via Downward API
    # StatefulSet ordinals.start=1, so pod-index starts at 1 (not 0)
    # Pod index 1 → STALWART_NODE_ID=1
    # Pod index 2 → STALWART_NODE_ID=2
    # Pod index 3 → STALWART_NODE_ID=3
    [cluster]
    coordinator = "nats"
    node-id = "%{env:STALWART_NODE_ID}%"
    {{- end }}
